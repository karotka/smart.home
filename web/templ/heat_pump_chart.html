{% include "_head.html" %}
<div class="topline">
    <div class="title">Heat Pump · charts</div>
    <div class="home">
        <a href="/"><img src="/static/home.svg" width="55" /></a>
    </div>
</div>

<div class="hpChartNav">
    <a href="/heat_pump.html" class="hpLinkBtn">← Back to Heat Pump</a>
</div>

<div class="hpCharts">
    <div id="chartContainer2" class="chartContainer"></div>
    <div id="chartContainer1" class="chartContainer"></div>
    <div id="chartContainer3" class="chartContainer"></div>
    <div id="chartContainer4" class="chartContainer"></div>
</div>

<script>
    // Charts hold references to these in-place — drained with .length=0,
    // never reassigned.
    var dps1 = [], dps2 = [], dps3 = [], dps4 = [], dps5 = [];

    var chart1 = new SimpleChart("chartContainer1", {
        title: "Last 30 days average ambient temperature",
        xFormat: "D.M.", yFormat: "#0.#°C", tooltipUnit: "°C",
        series: [{type: "line", color: "#ff6746", points: dps1}],
    });
    var chart2 = new SimpleChart("chartContainer2", {
        title: "Last 2 days power",
        xFormat: "HH:mm", yFormat: "#0W", tooltipUnit: " W",
        series: [{type: "column", color: "#ff4e28", points: dps2}],
    });
    var chart3 = new SimpleChart("chartContainer3", {
        title: "Last 2 days water temperature",
        xFormat: "HH:mm", yFormat: "#0.#°C", tooltipUnit: "°C",
        series: [
            {type: "line", color: "#ff6746", name: "in",  points: dps3},
            {type: "line", color: "yellow",  name: "out", points: dps4},
        ],
    });
    var chart4 = new SimpleChart("chartContainer4", {
        title: "Last 24 hours average ambient temperature",
        xFormat: "HH:mm", yFormat: "#0.#°C", tooltipUnit: "°C",
        series: [{type: "line", color: "#ff6746", points: dps5}],
    });

    window.addEventListener("resize", function () {
        chart1.render(); chart2.render(); chart3.render(); chart4.render();
    });

    window.onload = function() {
        hpChartClient.connect("");
        setInterval(timeNow, 500);
        setInterval(hpChartClient.heatPumpLoad,         60000);
        setInterval(hpChartClient.heatpump_hourlyCharts, 20000);
    };
</script>
