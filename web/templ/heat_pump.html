{% include "_head.html" %}
<div class="topline">
    <div class="title">TČ Philipp</div>
    <div class="home">
        <a href="/"><img src="/static/home.svg" width="55" /></a>
    </div>
</div>

<div class="hpDash">

    <!-- Hero: outlet (the number the heat pump itself thinks matters most). -->
    <div class="hpHero">
        <div class="hpHeroLabel">Water outlet temp.</div>
        <div id="hp_waterOut" class="hpHeroValue">—</div>
    </div>

    <!-- Inlet · tank · ambient — same row, like in the Tuya app. -->
    <div class="hpTempRow">
        <div class="hpTempCell">
            <div class="hpTempCaption">Water inlet</div>
            <div id="hp_waterIn" class="hpTempVal">—</div>
        </div>
        <div class="hpTempCell">
            <div class="hpTempCaption">Water tank</div>
            <div id="hp_waterTank" class="hpTempVal">—</div>
        </div>
        <div class="hpTempCell">
            <div class="hpTempCaption">Ambient</div>
            <div id="hp_ambient" class="hpTempVal">—</div>
        </div>
    </div>

    <!-- Target setpoint. Big number, minus/plus on each side. -->
    <div class="hpSetpoint">
        <div class="hpSetpointLabel">Target temp.</div>
        <div class="hpSetpointRow">
            <button class="hpStep" id="hp_dirDown"
                    onclick="hpClient.heatpump_setTemp('down')">−</button>
            <div id="hp_targetTemp" class="hpSetpointValue">—°C</div>
            <button class="hpStep" id="hp_dirUp"
                    onclick="hpClient.heatpump_setTemp('up')">+</button>
        </div>
    </div>

    <!-- Silent / Smart / Max -->
    <div class="hpSegment" id="hp_modeGroup">
        <button class="hpSegBtn" id="hp_mute"
                onclick="hpClient.heatpump_setMode('mute')">Silent</button>
        <button class="hpSegBtn" id="hp_smart"
                onclick="hpClient.heatpump_setMode('smart')">Smart</button>
        <button class="hpSegBtn" id="hp_strong"
                onclick="hpClient.heatpump_setMode('strong')">Max</button>
    </div>

    <!-- Heating / Cooling -->
    <div class="hpSegment" id="hp_workGroup">
        <button class="hpSegBtn" id="hp_heat"
                onclick="hpClient.heatpump_setWorkMode('heat')">Heating</button>
        <button class="hpSegBtn" id="hp_cool"
                onclick="hpClient.heatpump_setWorkMode('cool')">Cooling</button>
    </div>

    <!-- ON/OFF + live current draw -->
    <div class="hpFooter">
        <button class="hpPowerBtn" id="hp_on"
                onclick="hpClient.heatpump_setOnOff()">ON / OFF</button>
        <div class="hpCurrent">
            <div class="hpCurrentLabel">Current</div>
            <div id="hp_cc" class="hpCurrentVal">— A</div>
        </div>
    </div>

    <div class="hpNav">
        <a href="/heat_pump_chart.html"   class="hpLinkBtn">Charts</a>
        <a href="/heat_pump_settings.html" class="hpLinkBtn">Settings</a>
    </div>

</div>

<script>
    window.onload = function () {
        hpClient.connect("");
        setInterval(timeNow, 500);
        setInterval(hpClient.heatpump_status, 2000);
    };
</script>
