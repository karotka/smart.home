{% include "_head.html" %}
<div class="topline">
    <div class="title">Blinds</div>
    <div class="home">
        <a href="/"><img src="/static/home.svg" width="55" /></a>
    </div>
</div>

<div id="blinds" class="blinds">
{% for room, items in data["rooms"].items() %}
    <div class="blRoom">
        <div class="blRoomLabel">{{ room }}</div>
        <div class="blRoomBody">
{% for it in items %}
            <div class="blCard" data-id="{{ it['id'] }}">
                <div class="blName">{{ it["name"] }}</div>
                <div class="blPosLine">
                    <span class="blPosBar"><span class="blPosFill"></span></span>
                    <span class="blPosTxt">—</span>
                </div>
                <div class="blBtns">
                    <button class="blBtn" data-act="open">▲</button>
                    <button class="blBtn" data-act="stop">■</button>
                    <button class="blBtn" data-act="close">▼</button>
                </div>
                <input class="blSlider" type="range" min="0" max="100" value="0" />
            </div>
{% end %}
        </div>
    </div>
{% end %}
</div>
<div id="blindsToast" class="hpsToast"></div>

<script>
    window.onload = function () {
        blindsClient.connect("");
    };
</script>

{% include "_foot.html" %}
