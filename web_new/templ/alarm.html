{% include "_head.html" %}
<div class="topline">
    <div class="title">Alarm</div>
    <div class="home">
        <a href="/"><img src="/static/img/home.svg" width="55" /></a>
    </div>
</div>

<div class="container" style="overflow:auto; padding:10px;">
{% for zone in data["zones"] %}
    <div class="alarm-zone" id="alarm_{{zone['id']}}">
        {{zone["name"]}}
        <div class="alarm-status alarm-unknown" id="status_{{zone['id']}}">--</div>
    </div>
{% end %}
</div>

<script>
    function loadAlarmStatus() {
        var ws = new WebSocket("wss://" + location.host + "/websocket");
        ws.onopen = function() {
            ws.send(JSON.stringify({
                method: "alarm_status",
                id: 0,
                router: "alarm",
                params: {}
            }));
        };
        ws.onmessage = function(evt) {
            var msg = JSON.parse(evt.data);
            if (msg.router === "alarm" && msg.result && msg.result.zones) {
                var zones = msg.result.zones;
                for (var id in zones) {
                    var el = document.getElementById("status_" + id);
                    if (el) {
                        var value = zones[id];
                        el.textContent = value || "--";
                        el.className = "alarm-status " + (
                            value === "ok" ? "alarm-ok" :
                            value === "alert" ? "alarm-alert" :
                            "alarm-unknown"
                        );
                    }
                }
            }
            ws.close();
        };
    }
    loadAlarmStatus();
    setInterval(loadAlarmStatus, 5000);
</script>
